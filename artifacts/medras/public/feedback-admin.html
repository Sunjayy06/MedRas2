<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback Admin — MedRAS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
    }

    .adm-header {
      background: #1a2e5a;
      color: #e6eefb;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .adm-header h1 { font-size: 1.15rem; font-weight: 700; }
    .adm-header .adm-badge {
      background: #2563eb;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    .adm-header a {
      margin-left: auto;
      color: #93b4e8;
      font-size: 13px;
      text-decoration: none;
    }
    .adm-header a:hover { color: #e6eefb; }

    .adm-body { max-width: 1040px; margin: 0 auto; padding: 28px 20px 60px; }

    /* Controls */
    .adm-controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 20px;
    }
    .adm-search {
      flex: 1;
      min-width: 200px;
      padding: 9px 13px;
      border: 1.5px solid #dde3f0;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      color: #1e293b;
    }
    .adm-search:focus { outline: none; border-color: #2563eb; }
    .adm-filter {
      padding: 9px 12px;
      border: 1.5px solid #dde3f0;
      border-radius: 8px;
      font-size: 13px;
      background: #fff;
      color: #1e293b;
      cursor: pointer;
    }
    .adm-count {
      font-size: 13px;
      color: #64748b;
      margin-left: auto;
      white-space: nowrap;
    }
    .adm-export {
      padding: 8px 14px;
      background: #1a2e5a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .adm-export:hover { background: #243e78; }

    /* Table */
    .adm-table-wrap {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
    }
    thead th {
      background: #f8fafc;
      color: #475569;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: 11px 14px;
      text-align: left;
      border-bottom: 1.5px solid #e2e8f0;
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid #f1f5f9; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8fafc; }
    td { padding: 12px 14px; vertical-align: top; }

    .td-ts { color: #64748b; font-size: 12px; white-space: nowrap; }
    .td-module {
      white-space: nowrap;
    }
    .mod-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .mod-helix       { background: #dbeafe; color: #1d4ed8; }
    .mod-cohort      { background: #d1fae5; color: #065f46; }
    .mod-sigma       { background: #ede9fe; color: #5b21b6; }
    .mod-prologue    { background: #fef3c7; color: #92400e; }
    .mod-scriptorium { background: #fee2e2; color: #991b1b; }
    .mod-novus       { background: #cffafe; color: #155e75; }
    .mod-folio       { background: #f0fdf4; color: #14532d; }
    .mod-unknown     { background: #f1f5f9; color: #475569; }

    .td-page { color: #64748b; font-size: 12px; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .td-message { max-width: 360px; line-height: 1.5; color: #1e293b; }
    .td-email { font-size: 12px; color: #2563eb; }
    .td-email a { color: inherit; text-decoration: none; }
    .td-email a:hover { text-decoration: underline; }

    .adm-empty {
      text-align: center;
      padding: 56px 20px;
      color: #94a3b8;
    }
    .adm-empty svg { display: block; margin: 0 auto 12px; opacity: .4; }

    .adm-loading {
      text-align: center;
      padding: 48px;
      color: #94a3b8;
      font-size: 14px;
    }

    .adm-error {
      background: #fee2e2;
      border: 1px solid #fca5a5;
      border-radius: 10px;
      padding: 16px 20px;
      color: #991b1b;
      font-size: 14px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<div class="adm-header">
  <h1>MedRAS Feedback</h1>
  <span class="adm-badge">Admin</span>
  <a href="/">← Back to MedRAS</a>
</div>

<div class="adm-body">

  <div class="adm-controls">
    <input type="search" class="adm-search" id="adm-search" placeholder="Search messages, modules, emails…" />
    <select class="adm-filter" id="adm-module-filter">
      <option value="">All modules</option>
      <option value="helix">Helix</option>
      <option value="cohort">Cohort</option>
      <option value="sigma">Sigma</option>
      <option value="prologue">Prologue</option>
      <option value="scriptorium">Scriptorium</option>
      <option value="novus">Novus</option>
      <option value="folio">Folio</option>
      <option value="unknown">Unspecified</option>
    </select>
    <span class="adm-count" id="adm-count"></span>
    <button class="adm-export" id="adm-export">↓ Export CSV</button>
  </div>

  <div id="adm-error" class="adm-error" style="display:none;"></div>

  <div class="adm-table-wrap">
    <div class="adm-loading" id="adm-loading">Loading feedback…</div>
    <table id="adm-table" style="display:none;">
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>Module</th>
          <th>Page</th>
          <th>Message</th>
          <th>Email</th>
        </tr>
      </thead>
      <tbody id="adm-tbody"></tbody>
    </table>
    <div class="adm-empty" id="adm-empty" style="display:none;">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      No feedback found.
    </div>
  </div>
</div>

<script>
(function () {
  var allEntries = [];
  var tbody     = document.getElementById('adm-tbody');
  var table     = document.getElementById('adm-table');
  var loading   = document.getElementById('adm-loading');
  var empty     = document.getElementById('adm-empty');
  var errEl     = document.getElementById('adm-error');
  var countEl   = document.getElementById('adm-count');
  var searchEl  = document.getElementById('adm-search');
  var modFilter = document.getElementById('adm-module-filter');
  var exportBtn = document.getElementById('adm-export');

  /* Pill colour lookup */
  var PILL_CLASS = {
    helix:'mod-helix', cohort:'mod-cohort', sigma:'mod-sigma',
    prologue:'mod-prologue', scriptorium:'mod-scriptorium',
    novus:'mod-novus', folio:'mod-folio',
  };

  function fmtTs(ts) {
    if (!ts) return '—';
    try {
      var d = new Date(ts);
      return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' })
        + ' ' + d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
    } catch (e) { return ts; }
  }

  function esc(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function render(entries) {
    tbody.innerHTML = '';
    countEl.textContent = entries.length + ' entr' + (entries.length === 1 ? 'y' : 'ies');

    if (entries.length === 0) {
      table.style.display = 'none';
      empty.style.display = '';
      return;
    }
    empty.style.display = 'none';
    table.style.display = '';

    entries.forEach(function (e) {
      var mod   = (e.module || 'unknown').toLowerCase();
      var pill  = PILL_CLASS[mod] || 'mod-unknown';
      var label = mod.charAt(0).toUpperCase() + mod.slice(1);
      var email = (e.email || '').trim();

      var tr = document.createElement('tr');
      tr.innerHTML = [
        '<td class="td-ts">'    + esc(fmtTs(e.ts)) + '</td>',
        '<td class="td-module"><span class="mod-pill ' + pill + '">' + esc(label) + '</span></td>',
        '<td class="td-page" title="' + esc(e.page) + '">' + esc(e.page || '—') + '</td>',
        '<td class="td-message">' + esc(e.message) + '</td>',
        '<td class="td-email">' + (email
          ? '<a href="mailto:' + esc(email) + '">' + esc(email) + '</a>'
          : '<span style="color:#cbd5e1">—</span>') + '</td>',
      ].join('');
      tbody.appendChild(tr);
    });
  }

  function filtered() {
    var q   = (searchEl.value || '').toLowerCase().trim();
    var mod = (modFilter.value || '').toLowerCase();
    return allEntries.filter(function (e) {
      var matchMod = !mod || (e.module || 'unknown').toLowerCase() === mod;
      var matchQ   = !q ||
        (e.message || '').toLowerCase().includes(q) ||
        (e.module  || '').toLowerCase().includes(q) ||
        (e.email   || '').toLowerCase().includes(q) ||
        (e.page    || '').toLowerCase().includes(q);
      return matchMod && matchQ;
    });
  }

  function applyFilter() { render(filtered()); }

  searchEl.addEventListener('input', applyFilter);
  modFilter.addEventListener('change', applyFilter);

  /* CSV export */
  exportBtn.addEventListener('click', function () {
    var rows = filtered();
    if (!rows.length) return;
    var header = ['Timestamp','Module','Page','Message','Email'];
    var lines  = [header.join(',')];
    rows.forEach(function (e) {
      lines.push([e.ts, e.module, e.page, e.message, e.email]
        .map(function (v) { return '"' + (v||'').replace(/"/g,'""') + '"'; })
        .join(','));
    });
    var blob = new Blob([lines.join('\n')], { type: 'text/csv' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href     = url;
    a.download = 'medras-feedback-' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
    URL.revokeObjectURL(url);
  });

  /* Fetch */
  fetch('/api/feedback')
    .then(function (r) { return r.json(); })
    .then(function (data) {
      loading.style.display = 'none';
      allEntries = data.entries || [];
      if (allEntries.length === 0) {
        empty.style.display = '';
      } else {
        render(allEntries);
      }
    })
    .catch(function (err) {
      loading.style.display = 'none';
      errEl.textContent = 'Could not load feedback: ' + err.message;
      errEl.style.display = '';
    });
}());
</script>
</body>
</html>
